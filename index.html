<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>2EMME · Manuali Asset</title>
  <style>
    :root{--ottanio:#004D54;--gold:#b99a64;--ink:#082f34;--bg:#fbfaf6;--surface:#fff;--muted:rgba(8,47,52,.64);--line:rgba(0,77,84,.13);--soft:#f3eee5;--champagne:#e8dcc7;--error:#d32f2f;--wa:#25D366;--blue:#005596;--shadow:0 14px 36px rgba(0,77,84,.10)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{background:var(--bg);scroll-behavior:smooth}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top left,rgba(191,235,255,.28),transparent 34%),linear-gradient(180deg,#fffdf8 0%,#f7f1e7 100%);color:var(--ink);font-size:14px;line-height:1.4;padding-bottom:96px}.app{max-width:500px;margin:0 auto;min-height:100vh}.top{position:sticky;top:0;z-index:20;padding:10px 12px 8px;background:linear-gradient(180deg,rgba(251,250,246,.98) 88%,rgba(251,250,246,0));backdrop-filter:blur(16px)}.brand{display:flex;gap:10px;align-items:center;background:linear-gradient(135deg,var(--ottanio),#06383d);border-radius:24px;padding:10px 12px;box-shadow:var(--shadow)}.logo-mark{width:44px;height:44px;border-radius:14px;object-fit:cover;flex:0 0 auto;background:#fff}.brand-text{color:#fff;font-weight:900;font-size:18px;letter-spacing:-.03em}.brand-sub{color:#BFEBFF;font-size:9px;text-transform:uppercase;letter-spacing:.18em;font-weight:900;margin-top:2px}.controls{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:9px}select,.miniBtn,input{font:inherit}select,.miniBtn{min-height:44px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.9);color:var(--ottanio);font-weight:850;padding:0 12px;min-width:0}.miniBtn{background:var(--soft);border-color:rgba(185,154,100,.32)}.assetRail{display:flex;gap:8px;overflow:auto;margin:8px -12px 0;padding:0 12px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}.assetRail::-webkit-scrollbar{display:none}.chip{scroll-snap-align:start;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:10px 13px;white-space:nowrap;font-weight:850;font-size:12px}.chip.active{background:var(--ottanio);color:#fff;border-color:var(--ottanio)}.summary{display:none;margin:0 12px 10px;background:#fff;border:1px solid rgba(185,154,100,.25);border-radius:20px;padding:13px;box-shadow:0 8px 24px rgba(0,77,84,.07)}.summary.open{display:block}.summary b{display:block;font-size:15px}.summary p{margin:6px 0;color:var(--muted);font-size:12px}.facts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}.fact{background:#fbfaf6;border:1px solid rgba(185,154,100,.2);border-radius:14px;padding:9px;font-size:9px;text-transform:uppercase;color:var(--muted);font-weight:800}.fact strong{display:block;color:var(--ottanio);font-size:12px;text-transform:none;margin-top:3px}.tariff{margin:0 12px 10px;background:linear-gradient(135deg,#fff,var(--soft));border:1px solid rgba(185,154,100,.35);border-radius:20px;padding:10px 11px;display:grid;grid-template-columns:1fr 104px;gap:9px;align-items:center}.tariff b{font-size:12px}.tariff small{display:block;color:var(--muted);font-size:10px}.tariff input{height:36px;border-radius:999px;border:1px solid rgba(0,77,84,.14);padding:0 10px;color:var(--ottanio);font-weight:900;background:#fff;width:100%;text-align:center}.card{background:#fff;margin:0 12px 12px;border-radius:24px;padding:18px;border:1px solid rgba(185,154,100,.24);box-shadow:var(--shadow);position:relative;overflow:hidden}.kicker{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:900}.badge-ins{position:absolute;right:0;top:0;background:var(--blue);color:#fff;padding:6px 13px;border-bottom-left-radius:14px;font-size:10px;font-weight:900;text-transform:uppercase}.card h2{font-size:25px;line-height:1.04;letter-spacing:-.045em;margin:7px 0 4px}.model{color:var(--muted);font-weight:750;font-size:12px;margin:0 0 10px}.badges{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.badge{border:1px solid var(--line);background:#fbfaf6;border-radius:999px;padding:7px 10px;font-size:10px;color:var(--ottanio);font-weight:850}.ins-box{margin-top:12px;background:#f0f7ff;border:1px solid rgba(0,85,150,.12);border-radius:17px;padding:13px}.ins-title{font-size:10px;font-weight:950;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}.ins-detail{display:grid;grid-template-columns:88px 1fr;gap:8px;font-size:12px;margin:5px 0}.ins-detail span{color:var(--muted)}.energy{margin-top:12px;background:linear-gradient(135deg,var(--ottanio),#07383d);color:#fff;border-radius:20px;padding:13px}.energy h3{margin:0 0 2px;font-size:15px}.energy small{color:#BFEBFF}.energyGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.energyBox{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:15px;padding:9px}.energyBox span{display:block;color:#BFEBFF;font-size:9px;text-transform:uppercase;font-weight:900}.energyBox strong{display:block;font-size:15px;margin-top:4px}.energyBox.highlight{background:var(--champagne);color:var(--ink)}.energyBox.highlight span{color:rgba(8,47,52,.62)}.quickTitle{font-weight:950;font-size:13px;margin:13px 2px 7px;color:var(--ottanio)}.quick{display:grid;gap:7px}.q{display:grid;grid-template-columns:24px 1fr;gap:8px;align-items:start;background:#fbfaf6;border:1px solid rgba(185,154,100,.2);border-radius:16px;padding:9px}.num{width:24px;height:24px;border-radius:50%;background:var(--champagne);display:grid;place-items:center;font-size:11px;font-weight:900}.btn-claim,.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:0;text-decoration:none;color:#fff;border-radius:16px;min-height:48px;font-size:13px;font-weight:950}.btn-claim{background:var(--error);margin-top:14px}.btn-wa{background:var(--wa);margin-top:8px}.accordion{display:grid;gap:8px;margin:0 12px 12px}details{background:#fff;border:1px solid rgba(185,154,100,.24);border-radius:20px;overflow:hidden;box-shadow:0 8px 22px rgba(0,77,84,.05)}summary{list-style:none;cursor:pointer;padding:14px 15px;font-weight:950;display:flex;justify-content:space-between;align-items:center}summary::-webkit-details-marker{display:none}summary:after{content:'›';font-size:24px;line-height:1;color:var(--gold);transform:rotate(90deg)}details[open] summary:after{transform:rotate(-90deg)}.body{border-top:1px solid rgba(185,154,100,.20);padding:12px 15px;background:linear-gradient(180deg,#fff,#fbfaf6)}.body ul{margin:0;padding-left:18px}.body li{margin:0 0 7px}.program{background:#fff;border:1px solid rgba(185,154,100,.20);border-left:4px solid var(--ottanio);border-radius:14px;padding:10px;margin-bottom:9px}.program h4{margin:0 0 5px;font-size:14px}.program div{font-size:12px;margin:3px 0}.program strong{color:var(--ottanio)}.pills{display:flex;flex-wrap:wrap;gap:7px}.pills span{background:#fbfaf6;border:1px solid rgba(185,154,100,.22);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:850}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(251,250,246,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(185,154,100,.22);padding:9px 10px env(safe-area-inset-bottom)}.bottomInner{max-width:500px;margin:0 auto;display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.navBtn{border:0;background:var(--ottanio);color:#fff;border-radius:999px;height:44px;padding:0 18px;font-weight:950}.navBtn:disabled{opacity:.28}.count{text-align:center;font-size:12px;font-weight:950}.errorBox{margin:16px 12px;background:#fff3f3;border:1px solid rgba(211,47,47,.28);border-radius:20px;padding:16px;color:#7a1d1d}.legal{max-width:500px;margin:16px auto 0;padding:0 16px 26px;color:rgba(8,47,52,.58);font-size:10px;text-align:center;line-height:1.45}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><img class="logo-mark" src="logo.jpg" alt="2EMME Apartments"><div><div class="brand-text">2EMME</div><div class="brand-sub">Luxury Manuals</div></div></div>
    <div class="controls"><select id="aptSelect"></select><button class="miniBtn" id="infoBtn">Info</button></div>
    <nav id="assetRail" class="assetRail"></nav>
  </header>
  <section id="summary" class="summary"></section>
  <section class="tariff"><div><b>Stima costi energia</b><small>Tariffa modificabile €/kWh</small></div><input id="tariffInput" type="number" inputmode="decimal" min="0" step="0.01" value="0.30"></section>
  <main id="appView"></main>
  <footer class="legal">© 2026 2EMME Apartments / 2EMME Consulting. Tutti i diritti riservati.</footer>
</div>
<footer class="bottom"><div class="bottomInner"><button id="prev" class="navBtn">←</button><div id="count" class="count"></div><button id="next" class="navBtn">→</button></div></footer>
<script>
let DB=null;const state={apt:0,asset:0};const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const list=a=>'<ul>'+((a||[]).map(x=>'<li>'+esc(x)+'</li>').join(''))+'</ul>';const euro=n=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(n);const kwh=n=>new Intl.NumberFormat('it-IT',{maximumFractionDigits:0}).format(n)+' kWh';function tariff(){const v=Number(String($('tariffInput').value).replace(',','.'));return Number.isFinite(v)&&v>0?v:(DB?.settings?.defaultEnergyTariff||.30)}function apt(){return DB.apartments[state.apt]||DB.apartments[0]}function asset(){const a=apt();state.asset=Math.max(0,Math.min(state.asset,a.assets.length-1));return a.assets[state.asset]}function renderSelect(){ $('aptSelect').innerHTML=DB.apartments.map((a,i)=>`<option value="${i}">${esc(a.shortName||a.publicName)}</option>`).join('');$('aptSelect').value=state.apt}function renderSummary(){const a=apt();$('summary').innerHTML=`<b>${esc(a.publicName)}</b><p>${esc(a.address)}</p><p>${esc(a.homepageDescription)}</p><div class="facts"><div class="fact">Piano<strong>${esc(a.floor||'N/D')}</strong></div><div class="fact">Ascensore<strong>${esc(a.elevator||'N/D')}</strong></div><div class="fact">Portineria<strong>${esc(a.doorman||'N/D')}</strong></div><div class="fact">Assistenza<strong>${esc(a.supportPhone||'N/D')}</strong></div></div>`}function renderRail(){const a=apt();$('assetRail').innerHTML=a.assets.map((x,i)=>`<button class="chip ${i===state.asset?'active':''}" data-i="${i}">${esc(x.item)} <small>${esc(x.id)}</small></button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.asset=Number(b.dataset.i);render();scrollTo({top:0,behavior:'smooth'})})}function energy(x){const c=Number(x.consumptionKwhYear||0);if(!c)return `<section class="energy"><h3>Consumi e costi</h3><small>Dato energetico non disponibile per questo asset.</small></section>`;const t=tariff();return `<section class="energy"><h3>Consumo energetico</h3><small>Stima con tariffa ${euro(t)}/kWh</small><div class="energyGrid"><div class="energyBox"><span>Energia annua</span><strong>${kwh(c)}</strong></div><div class="energyBox highlight"><span>Costo annuo</span><strong>${euro(c*t)}</strong></div><div class="energyBox"><span>Costo mensile</span><strong>${euro(c*t/12)}</strong></div><div class="energyBox"><span>Costo giornaliero</span><strong>${euro(c*t/365)}</strong></div></div></section>`}function programCards(arr){return (arr||[]).map(p=>`<div class="program"><h4>${esc(p.name)}</h4><div><strong>Durata:</strong> ${esc(p.duration||'variabile')}</div><div><strong>Adatto per:</strong> ${esc(p.suitableFor||'uso ordinario')}</div>${p.notes?`<div><strong>Note:</strong> ${esc(p.notes)}</div>`:''}${p.warnings?.length?`<div><strong>Avvertenze:</strong></div>${list(p.warnings)}`:''}</div>`).join('')}function allDetails(x){return ['washProgramsDetailed','dryProgramsDetailed','dishwasherProgramsDetailed','microwaveProgramsDetailed','coffeeProgramsDetailed'].flatMap(k=>x[k]||[])}function claim(){const a=apt(),x=asset(),to=DB.settings.claimEmail,subject=`per roberta da 2emmeApartment - ${a.shortName||a.publicName}`,body=`Ciao Roberta,\n\nSegnalo sinistro per l'alloggio: ${a.publicName}\n\nDettagli Asset:\n- Bene: ${x.item}\n- Modello: ${x.brandModel}\n- Polizza: ${a.policy||'N/D'}\n\nAttendo istruzioni sulla documentazione (foto/preventivi).\n\nSaluti,\nMatteo Masella`;location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`}function renderAsset(){const a=apt(),x=asset(),details=allDetails(x);$('count').textContent=`Asset ${state.asset+1} di ${a.assets.length}`;$('prev').disabled=state.asset===0;$('next').disabled=state.asset===a.assets.length-1;$('appView').innerHTML=`<article class="card"><div class="badge-ins">Coperto</div><div class="kicker">${esc(x.id)} · ${esc(x.category||'Asset')}</div><h2>${esc(x.item)}</h2><p class="model">${esc(x.brandModel||x.model||'')}</p><div class="badges"><span class="badge">${esc(x.category||'Asset')}</span>${x.purchaseDate?`<span class="badge">Acq. ${esc(x.purchaseDate)}</span>`:''}${x.serial?`<span class="badge">Seriale ${esc(x.serial)}</span>`:''}</div><div class="ins-box"><div class="ins-title">Dettagli assicurativi</div><div class="ins-detail"><span>Polizza</span><b>${esc(a.policy||'N/D')}</b></div><div class="ins-detail"><span>Copertura</span><b>${esc(x.coverage||'Contenuto / dotazioni alloggio')}</b></div><div class="ins-detail"><span>Franchigia</span><b>${esc(x.franchise||'Da verificare in polizza')}</b></div></div>${energy(x)}<div class="quickTitle">Uso rapido</div><div class="quick">${(x.quickUse||[]).map((s,i)=>`<div class="q"><span class="num">${i+1}</span><span>${esc(s)}</span></div>`).join('')}</div><button class="btn-claim" id="claimBtn">Segnala danno a Roberta</button><a class="btn-wa" href="https://wa.me/${esc(DB.settings.whatsapp)}">WhatsApp Host</a></article><section class="accordion"><details open><summary>Uso consigliato</summary><div class="body"><p>${esc(x.green||'')}</p>${(x.detailedPrograms||[]).map(t=>`<p>${esc(t)}</p>`).join('')}</div></details><details><summary>Programmi disponibili</summary><div class="body"><div class="pills">${(x.programs||[]).map(p=>`<span>${esc(p)}</span>`).join('')}</div></div></details>${details.length?`<details><summary>Programmi dettagliati</summary><div class="body">${programCards(details)}</div></details>`:''}<details><summary>Problemi frequenti</summary><div class="body">${list(x.troubleshooting)}</div></details><details><summary>Manutenzione</summary><div class="body">${list(x.maintenance)}</div></details><details><summary>Scheda asset e assistenza</summary><div class="body"><p><strong>Seriale:</strong> ${esc(x.serial||'N/D')}</p><p><strong>Acquisto:</strong> ${esc(x.purchaseDate||'N/D')}</p><p><strong>Assistenza:</strong> ${esc(x.assistance||'N/D')}</p></div></details></section>`;$('claimBtn').onclick=claim}function render(){renderSelect();renderSummary();renderRail();renderAsset()}async function init(){try{const res=await fetch('assets.json',{cache:'no-store'});if(!res.ok)throw new Error('assets.json non trovato');DB=await res.json();render()}catch(e){$('appView').innerHTML=`<div class="errorBox"><b>Errore caricamento dati</b><p>${esc(e.message)}</p><p>Carica index.html, assets.json e logo.jpg nella stessa cartella della repo.</p></div>`}}$('aptSelect').onchange=e=>{state.apt=Number(e.target.value);state.asset=0;render()};$('infoBtn').onclick=()=>$('summary').classList.toggle('open');$('tariffInput').oninput=()=>DB&&renderAsset();$('prev').onclick=()=>{state.asset--;render();scrollTo({top:0,behavior:'smooth'})};$('next').onclick=()=>{state.asset++;render();scrollTo({top:0,behavior:'smooth'})};init();
</script>
</body>
</html>
